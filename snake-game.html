<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake Game</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#050a05;--grid:#0d1f0d;--snake:#39ff14;--snake2:#1aff1a;--food:#ff0080;--text:#39ff14;--dim:#1a4d1a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Orbitron',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(57,255,20,.03) 39px,rgba(57,255,20,.03) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(57,255,20,.03) 39px,rgba(57,255,20,.03) 40px);pointer-events:none}
  h1{font-family:'Press Start 2P',monospace;font-size:1.4rem;color:var(--snake);text-shadow:0 0 20px var(--snake),0 0 40px rgba(57,255,20,.5);margin-bottom:1rem;letter-spacing:.05em}
  .hud{display:flex;gap:2rem;margin-bottom:.8rem;font-size:.65rem;letter-spacing:.1em}
  .hud-item{display:flex;flex-direction:column;align-items:center;gap:4px}
  .hud-val{font-size:1.1rem;font-weight:700;color:#fff;text-shadow:0 0 10px var(--snake)}
  .hud-lbl{color:var(--dim);font-size:.5rem}
  #canvas{border:2px solid var(--snake);box-shadow:0 0 30px rgba(57,255,20,.3),inset 0 0 30px rgba(0,0,0,.5);display:block;cursor:none}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,10,5,.92);gap:1rem}
  .overlay h2{font-family:'Press Start 2P',monospace;font-size:1rem;color:var(--food);text-shadow:0 0 20px var(--food)}
  .overlay p{font-size:.6rem;color:var(--dim);letter-spacing:.1em}
  .btn{padding:10px 28px;background:transparent;border:2px solid var(--snake);color:var(--snake);font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:.1em;transition:all .2s;text-transform:uppercase}
  .btn:hover{background:var(--snake);color:#000;box-shadow:0 0 20px var(--snake)}
  .wrap{position:relative}
  .speed-indicator{font-size:.5rem;color:var(--dim);margin-top:.5rem;text-align:center;letter-spacing:.1em}
  .controls-hint{font-size:.45rem;color:var(--dim);margin-top:.3rem;text-align:center;letter-spacing:.05em}
</style>
</head>
<body>
<h1>SNAKE</h1>
<div class="hud">
  <div class="hud-item"><div class="hud-val" id="score">0</div><div class="hud-lbl">SCORE</div></div>
  <div class="hud-item"><div class="hud-val" id="best">0</div><div class="hud-lbl">BEST</div></div>
  <div class="hud-item"><div class="hud-val" id="level">1</div><div class="hud-lbl">LEVEL</div></div>
  <div class="hud-item"><div class="hud-val" id="length">1</div><div class="hud-lbl">LENGTH</div></div>
</div>
<div class="wrap">
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-msg">USE ARROW KEYS OR WASD</p>
    <button class="btn" id="start-btn" onclick="startGame()">START GAME</button>
  </div>
</div>
<div class="speed-indicator" id="speed-txt">SPEED: NORMAL</div>
<div class="controls-hint">↑↓←→ or WASD to move · Eat food to grow · Don't hit walls or yourself</div>

<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const CELL=20,COLS=20,ROWS=20;
let snake,dir,nextDir,food,bonus,score,best=0,level,running=false,gameLoop,frame=0,particles=[];

function cell(x,y){return{x,y}}
function rand(n){return Math.floor(Math.random()*n)}

function startGame(){
  document.getElementById('overlay').style.display='none';
  snake=[cell(10,10),cell(9,10),cell(8,10)];
  dir=cell(1,0);nextDir=cell(1,0);
  score=0;level=1;frame=0;particles=[];bonus=null;
  spawnFood();updateHUD();
  clearInterval(gameLoop);
  running=true;
  gameLoop=setInterval(tick,150);
}

function spawnFood(){
  do{food=cell(rand(COLS),rand(ROWS))}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
  if(score>0&&score%50===0&&!bonus){
    do{bonus=cell(rand(COLS),rand(ROWS))}
    while(snake.some(s=>s.x===bonus.x&&s.y===bonus.y)||bonus.x===food.x&&bonus.y===food.y);
  }
}

function tick(){
  frame++;
  dir=nextDir;
  const head=cell(snake[0].x+dir.x,snake[0].y+dir.y);
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    endGame();return;
  }
  snake.unshift(head);
  let grew=false;
  if(head.x===food.x&&head.y===food.y){
    const pts=10*level;score+=pts;grew=true;
    burst(food.x*CELL+CELL/2,food.y*CELL+CELL/2,'#ff0080',8);
    level=Math.floor(score/100)+1;
    clearInterval(gameLoop);
    const spd=Math.max(60,150-level*12);
    gameLoop=setInterval(tick,spd);
    document.getElementById('speed-txt').textContent='SPEED: '+['SLOW','NORMAL','FAST','FASTER','BLAZING','INSANE','LUDICROUS'][Math.min(level-1,6)];
    spawnFood();
  }
  if(bonus&&head.x===bonus.x&&head.y===bonus.y){
    score+=50*level;grew=true;bonus=null;
    burst(head.x*CELL+CELL/2,head.y*CELL+CELL/2,'#ffff00',12);
  }
  if(!grew)snake.pop();
  if(score>best)best=score;
  updateHUD();draw();
}

function burst(x,y,color,n){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,color});
}

function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  document.getElementById('level').textContent=level;
  document.getElementById('length').textContent=snake.length;
}

function draw(){
  ctx.fillStyle=`rgba(5,10,5,0.85)`;
  ctx.fillRect(0,0,400,400);
  // Grid
  ctx.strokeStyle='rgba(57,255,20,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,400);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(400,j*CELL);ctx.stroke();}
  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
    p.x+=p.vx;p.y+=p.vy;p.life-=0.06;
  });ctx.globalAlpha=1;
  // Food
  const pulse=0.7+0.3*Math.sin(frame*0.2);
  ctx.shadowBlur=20*pulse;ctx.shadowColor='#ff0080';
  ctx.fillStyle='#ff0080';
  ctx.fillRect(food.x*CELL+2,food.y*CELL+2,CELL-4,CELL-4);
  // Bonus
  if(bonus){
    const p2=0.7+0.3*Math.sin(frame*0.3+1);
    ctx.shadowBlur=20*p2;ctx.shadowColor='#ffff00';
    ctx.fillStyle='#ffff00';
    ctx.beginPath();
    ctx.moveTo(bonus.x*CELL+CELL/2,bonus.y*CELL+2);
    ctx.lineTo(bonus.x*CELL+CELL-2,bonus.y*CELL+CELL-2);
    ctx.lineTo(bonus.x*CELL+2,bonus.y*CELL+CELL-2);
    ctx.closePath();ctx.fill();
  }
  ctx.shadowBlur=0;
  // Snake
  snake.forEach((s,i)=>{
    const ratio=1-i/snake.length;
    const green=Math.floor(255*ratio);
    ctx.fillStyle=i===0?'#fff':`rgb(${Math.floor(20*ratio)},${green},${Math.floor(20*ratio)})`;
    if(i===0){ctx.shadowBlur=15;ctx.shadowColor='#39ff14';}
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
    ctx.shadowBlur=0;
    // Eyes on head
    if(i===0){
      ctx.fillStyle='#000';
      const ex=dir.x===0?[3,CELL-7]:[CELL/2-1,CELL/2-1];
      const ey=dir.y===0?[3,CELL-7]:[CELL/2-1,CELL/2-1];
      if(dir.x!==0){ctx.fillRect(s.x*CELL+CELL/2-1,s.y*CELL+3,3,3);ctx.fillRect(s.x*CELL+CELL/2-1,s.y*CELL+CELL-6,3,3);}
      else{ctx.fillRect(s.x*CELL+3,s.y*CELL+CELL/2-1,3,3);ctx.fillRect(s.x*CELL+CELL-6,s.y*CELL+CELL/2-1,3,3);}
    }
  });
}

function endGame(){
  running=false;clearInterval(gameLoop);
  burst(snake[0].x*CELL+CELL/2,snake[0].y*CELL+CELL/2,'#ff0080',20);
  draw();
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.getElementById('overlay-title').textContent='GAME OVER';
  document.getElementById('overlay-msg').textContent=`SCORE: ${score} | LEVEL: ${level}`;
  document.getElementById('start-btn').textContent='PLAY AGAIN';
}

document.addEventListener('keydown',e=>{
  if(!running)return;
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
             w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
             W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  const nd=map[e.key];
  if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y)){nextDir=nd;e.preventDefault();}
});

// Touch controls
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(!running)return;
  if(Math.abs(dx)>Math.abs(dy)){nextDir=dx>0?{x:1,y:0}:{x:-1,y:0};}
  else{nextDir=dy>0?{x:0,y:1}:{x:0,y:-1};}
},{passive:false});

// Initial draw
ctx.fillStyle='#050a05';ctx.fillRect(0,0,400,400);
</script>
</body>
</html>
